name: PR Size Label

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  pr-size-check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check PR Size
        uses: actions/github-script@v7
        with:
          script: |
            const { additions, deletions } = context.payload.pull_request;
            const total = additions + deletions;
            let label = '';
            if (total < 50) label = 'size/S';
            else if (total < 200) label = 'size/M';
            else if (total < 500) label = 'size/L';
            else label = 'size/XL';

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: [label]
              });
            } catch (e) {
              console.log('Label not found, skipping:', label);
            }

            if (total > 500) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `⚠️ **Large PR detected** (${additions} additions, ${deletions} deletions)\n\nThis PR is large — consider splitting it into smaller, independently reviewable pieces.`
              });
            }